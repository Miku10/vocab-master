name: Build Vocab Master

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 前端依赖安装（仍在 frontend 目录）
      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # 构建 Tauri 安装程序（工作目录在项目根目录，通过 npx --prefix 调用 frontend 中的 CLI）
      - name: Build NSIS installer
        run: npx --prefix frontend tauri build --bundles nsis
        # 默认 working-directory 为项目根目录（即 checkout 的根），无需显式指定

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VocabMaster-Setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Cleanup build environment
        run: |
          Remove-Item -Recurse -Force "$env:USERPROFILE\.cargo\registry" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:USERPROFILE\.cargo\git" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "src-tauri\target" -ErrorAction SilentlyContinue
          echo "Build environment cleaned up."