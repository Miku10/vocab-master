name: Build Vocab Master

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root deps (@tauri-apps/cli)
        run: npm install
        working-directory: .

      - name: Install frontend deps
        run: npm install
        working-directory: frontend

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build NSIS installer
        run: npm run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VocabMaster-Setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Cleanup build environment
        run: |
          Remove-Item -Recurse -Force "$env:USERPROFILE\.cargo\registry" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:USERPROFILE\.cargo\git" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "src-tauri\target" -ErrorAction SilentlyContinue
          echo "Build environment cleaned up."
